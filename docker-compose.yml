services:
  postgres:
    container_name: films-postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-films}
      POSTGRES_USER: ${POSTGRES_USER:-films}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-films_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-films} -d ${POSTGRES_DB:-films}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  redis:
    container_name: films-redis
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    restart: unless-stopped

  films:
    container_name: films
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8282:8282"
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER:-films}:${POSTGRES_PASSWORD:-films_password}@postgres:5432/${POSTGRES_DB:-films}?sslmode=disable"
      ALLOHA_UPSTREAM_PROXY_URL: "socks5://naAv3d:rdYE17@46.8.58.218:8000"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    restart: unless-stopped
  caddy:
    container_name: films-caddy
    image: caddy:2.8-alpine
    depends_on:
      - films
    user: "0:0"
    environment:
      FILMS_DOMAIN: "ruwcdymvkbox.duckdns.org"
      CERT_FILE: "/certs/ruwcdymvkbox.duckdns.org.cer"
      KEY_FILE: "/certs/ruwcdymvkbox.duckdns.org.cer.key"
    entrypoint: ["/bin/sh", "/usr/local/bin/caddy-entrypoint.sh"]
    ports:
      - "80:80"
      - "4443:4443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy-entrypoint.sh:/usr/local/bin/caddy-entrypoint.sh:ro
      - /var/lib/marzban/certs:/certs:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  redis_data:
