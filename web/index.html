<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinema</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #09090b;
  --surface: #111113;
  --surface2: #18181b;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text: #fafafa;
  --muted: #71717a;
  --accent: #f97316;
  --accent-dim: rgba(249,115,22,0.15);
  --blue: #60a5fa;
  --green: #4ade80;
  --red: #f87171;
  --r: 12px;
  --r-sm: 8px;
}

html, body { height: 100%; }

body {
  font-family: system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
}

/* ── Layout ── */
#app { display: flex; flex-direction: column; min-height: 100vh; }

header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(9,9,11,0.88);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  height: 56px;
  display: flex;
  align-items: center;
  gap: 16px;
}

.brand {
  font-weight: 700;
  font-size: 16px;
  letter-spacing: -0.01em;
  color: var(--text);
  cursor: pointer;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 8px;
}
.brand svg { color: var(--accent); }

.search-wrap {
  flex: 1;
  max-width: 420px;
  position: relative;
}
.search-wrap input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 8px 16px 8px 36px;
  color: var(--text);
  font: inherit;
  font-size: 13px;
  outline: none;
  transition: border-color .15s;
}
.search-wrap input:focus { border-color: var(--border2); }
.search-icon {
  position: absolute;
  left: 11px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  pointer-events: none;
}

.provider-tabs {
  display: flex;
  gap: 4px;
  margin-left: auto;
  flex-shrink: 0;
}
.provider-tabs button {
  padding: 6px 14px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font: inherit;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s;
}
.provider-tabs button.active {
  background: var(--accent-dim);
  border-color: rgba(249,115,22,0.3);
  color: var(--accent);
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}
.icon-btn, .text-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  min-height: 32px;
  padding: 6px 10px;
  border-radius: var(--r-sm);
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font: inherit;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s;
}
.icon-btn { width: 34px; padding: 0; }
.icon-btn:hover, .text-btn:hover { border-color: var(--border2); color: var(--text); }
.user-chip {
  max-width: 140px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  color: var(--text);
  border-color: var(--border2);
  background: var(--surface2);
}

main { flex: 1; padding: 24px 20px; max-width: 1400px; margin: 0 auto; width: 100%; }

/* ── Tabs / Pills ── */
.tabs {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 20px;
}
.tab {
  padding: 7px 16px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font: inherit;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
}
.tab:hover { border-color: var(--border2); color: var(--text); }
.tab.active {
  background: var(--surface2);
  border-color: var(--border2);
  color: var(--text);
}

/* ── Filter bar ── */
.filter-bar {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 20px;
  align-items: center;
}
.filter-bar select, .filter-bar input[type=number] {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  color: var(--text);
  font: inherit;
  font-size: 13px;
  padding: 7px 10px;
  outline: none;
  cursor: pointer;
  transition: border-color .15s;
}
.filter-bar select:focus, .filter-bar input[type=number]:focus { border-color: var(--border2); }
.filter-bar input[type=number] { width: 90px; }
.filter-bar label { color: var(--muted); font-size: 12px; }

.apply-btn {
  padding: 7px 16px;
  border-radius: var(--r-sm);
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font: inherit;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s;
}
.apply-btn:hover { border-color: var(--border2); }

/* ── Grid ── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 16px;
}

.card {
  border-radius: var(--r);
  background: var(--surface);
  border: 1px solid var(--border);
  overflow: hidden;
  cursor: pointer;
  transition: transform .15s, border-color .15s;
}
.card:hover { transform: translateY(-3px); border-color: var(--border2); }

.card-poster {
  aspect-ratio: 2/3;
  background: var(--surface2);
  position: relative;
  overflow: hidden;
}
.card-poster img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}
.card-rating {
  position: absolute;
  top: 8px; right: 8px;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(6px);
  border-radius: 6px;
  padding: 3px 8px;
  font-size: 12px;
  font-weight: 700;
  color: #fbbf24;
}
.card-info { padding: 10px 12px 12px; }
.card-title {
  font-weight: 600;
  font-size: 13px;
  line-height: 1.35;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 4px;
}
.card-meta { color: var(--muted); font-size: 12px; }

/* ── Loading skeleton ── */
.skeleton {
  background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
  border-radius: 4px;
}
@keyframes shimmer { 0% { background-position: 200% 0 } 100% { background-position: -200% 0 } }
.sk-poster { aspect-ratio: 2/3; }
.sk-title { height: 16px; width: 75%; margin: 10px 12px 6px; }
.sk-meta { height: 12px; width: 45%; margin: 0 12px 12px; }

/* ── Empty / error states ── */
.state-box {
  grid-column: 1 / -1;
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
}
.state-box strong { display: block; color: var(--text); font-size: 16px; margin-bottom: 8px; }

/* ── Load more ── */
.load-more-wrap { margin-top: 28px; text-align: center; }
.load-more {
  padding: 10px 28px;
  border-radius: var(--r);
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font: inherit;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s;
}
.load-more:hover { border-color: var(--border2); }
.load-more:disabled { opacity: .4; cursor: default; }

/* ── Page title ── */
.page-title {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.page-title small { color: var(--muted); font-size: 13px; font-weight: 400; }

/* ── Back button ── */
.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font: inherit;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  margin-bottom: 24px;
  transition: all .15s;
}
.back-btn:hover { border-color: var(--border2); color: var(--text); }

/* ── Detail view ── */
.detail-layout {
  display: grid;
  grid-template-columns: 260px minmax(0, 1fr);
  gap: 32px;
  align-items: start;
}
.detail-poster {
  border-radius: var(--r);
  overflow: hidden;
  aspect-ratio: 2/3;
  background: var(--surface2);
}
.detail-poster img { width: 100%; height: 100%; object-fit: cover; display: block; }

.detail-title { font-size: 24px; font-weight: 700; line-height: 1.2; margin-bottom: 6px; }
.detail-original { color: var(--muted); font-size: 15px; margin-bottom: 16px; }

.detail-badges { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
.badge {
  padding: 5px 12px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--surface2);
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
}
.badge.rating { background: rgba(251,191,36,0.1); border-color: rgba(251,191,36,0.25); color: #fbbf24; }
.badge.genre { background: rgba(96,165,250,0.1); border-color: rgba(96,165,250,0.2); color: var(--blue); }

.detail-desc { color: var(--muted); line-height: 1.7; font-size: 14px; margin-bottom: 28px; }

/* ── Player ── */
.player-section { border-top: 1px solid var(--border); padding-top: 24px; }
.player-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
  flex-wrap: wrap;
  gap: 10px;
}
.player-title { font-size: 15px; font-weight: 700; }
.player-controls { display: flex; align-items: center; gap: 8px; }

.status-badge {
  padding: 4px 10px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 700;
  background: rgba(74,222,128,0.1);
  border: 1px solid rgba(74,222,128,0.2);
  color: var(--green);
}
.status-badge.loading { background: rgba(249,115,22,0.1); border-color: rgba(249,115,22,0.2); color: var(--accent); }
.status-badge.error { background: rgba(248,113,113,0.1); border-color: rgba(248,113,113,0.2); color: var(--red); }

.reload-btn {
  padding: 6px 12px;
  border-radius: var(--r-sm);
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font: inherit;
  font-size: 12px;
  cursor: pointer;
  transition: all .15s;
}
.reload-btn:hover { border-color: var(--border2); color: var(--text); }

.section-tabs {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 18px;
}
.library-toolbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  margin-bottom: 18px;
  flex-wrap: wrap;
}
.card-actions {
  display: flex;
  gap: 8px;
  margin-top: 10px;
}
.card-actions button {
  flex: 1;
  min-height: 30px;
  border-radius: var(--r-sm);
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--muted);
  font: inherit;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
}
.card-actions button:hover { color: var(--text); border-color: var(--border2); }

.modal-backdrop {
  position: fixed;
  inset: 0;
  z-index: 200;
  background: rgba(0,0,0,0.72);
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-backdrop.active { display: flex; }
.modal {
  width: min(380px, 100%);
  border-radius: var(--r);
  border: 1px solid var(--border);
  background: var(--surface);
  padding: 18px;
  box-shadow: 0 24px 80px rgba(0,0,0,0.5);
}
.modal-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}
.modal-title { font-size: 16px; font-weight: 700; }
.form-grid { display: grid; gap: 10px; }
.form-grid input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  color: var(--text);
  font: inherit;
  padding: 10px 12px;
  outline: none;
}
.form-grid input:focus { border-color: var(--border2); }
.form-error { min-height: 18px; color: var(--red); font-size: 12px; }

.admin-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
  gap: 12px;
  margin-bottom: 18px;
}
.stat-card {
  border: 1px solid var(--border);
  background: var(--surface);
  border-radius: var(--r);
  padding: 14px;
}
.stat-card strong { display: block; font-size: 22px; line-height: 1.1; margin-bottom: 6px; }
.stat-card span { color: var(--muted); font-size: 12px; }
.table-wrap {
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
  background: var(--surface);
}
table { width: 100%; border-collapse: collapse; }
th, td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  text-align: left;
  font-size: 13px;
  vertical-align: middle;
}
th { color: var(--muted); font-weight: 600; background: var(--surface2); }
tr:last-child td { border-bottom: 0; }
td select {
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: 6px 8px;
}

.player-shell {
  position: relative;
  width: 100%;
  aspect-ratio: 16/9;
  border-radius: var(--r);
  overflow: hidden;
  background: #000;
  border: 1px solid var(--border);
}
.player-shell iframe {
  width: 100%; height: 100%;
  border: 0;
  display: none;
}
.player-placeholder, .player-loading {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  color: var(--muted);
  text-align: center;
  padding: 24px;
}
.player-placeholder strong { color: var(--text); font-size: 15px; }
.player-placeholder p { font-size: 13px; max-width: 400px; }
.player-placeholder button {
  margin-top: 8px;
  padding: 10px 24px;
  border-radius: var(--r-sm);
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font: inherit;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s;
}
.player-placeholder button:hover { border-color: var(--border2); }

.player-loading { display: none; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); }
.player-loading.active { display: flex; }
.spinner {
  width: 40px; height: 40px;
  border-radius: 50%;
  border: 3px solid rgba(255,255,255,0.1);
  border-top-color: var(--accent);
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Responsive ── */
@media (max-width: 860px) {
  .detail-layout { grid-template-columns: 1fr; }
  .detail-poster { max-width: 220px; }
}
@media (max-width: 600px) {
  header { gap: 10px; }
  .search-wrap { max-width: none; }
  .brand span { display: none; }
  .provider-tabs { order: 3; width: 100%; overflow-x: auto; padding-bottom: 4px; }
  header { height: auto; min-height: 56px; padding-top: 10px; padding-bottom: 10px; flex-wrap: wrap; }
  .header-actions { margin-left: auto; }
  .user-chip { max-width: 92px; }
  .grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }
  th, td { padding: 9px 8px; font-size: 12px; }
}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="brand" id="brandBtn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <rect x="2" y="4" width="20" height="16" rx="4" stroke="currentColor" stroke-width="1.5"/>
        <path d="M9.5 8.5l6 3.5-6 3.5V8.5z" fill="currentColor"/>
      </svg>
      <span>Cinema</span>
    </div>

    <div class="search-wrap">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none">
        <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
        <path d="M16 16l4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Поиск фильмов..." autocomplete="off">
    </div>

    <div class="provider-tabs" id="providerTabs">
      <button class="active" disabled>Alloha</button>
    </div>

    <div class="header-actions" id="headerActions">
      <button class="icon-btn" title="Избранное" onclick="renderLibrary('favorites')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 21s-7-4.6-9.4-9.1C.6 8.1 2.9 4 7 4c2 0 3.4 1.1 5 3 1.6-1.9 3-3 5-3 4.1 0 6.4 4.1 4.4 7.9C19 16.4 12 21 12 21z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>
      </button>
      <button class="icon-btn" title="История" onclick="renderLibrary('history')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M3 12a9 9 0 1 0 3-6.7M3 4v5h5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M12 7v5l3 2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      </button>
      <button class="text-btn" id="adminBtn" style="display:none" onclick="renderAdmin()">Админ</button>
      <button class="text-btn" id="loginBtn" onclick="showAuthModal('login')">Войти</button>
    </div>
  </header>

  <main id="main">
    <!-- home, search, or detail rendered here -->
  </main>

  <div class="modal-backdrop" id="authModal">
    <div class="modal">
      <div class="modal-head">
        <div class="modal-title" id="authTitle">Вход</div>
        <button class="icon-btn" onclick="hideAuthModal()" title="Закрыть">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="section-tabs">
        <button class="tab active" id="authLoginTab" onclick="showAuthModal('login')">Вход</button>
        <button class="tab" id="authRegisterTab" onclick="showAuthModal('register')">Регистрация</button>
      </div>
      <form class="form-grid" onsubmit="submitAuth(event)">
        <input id="authLogin" autocomplete="username" placeholder="Логин">
        <input id="authPassword" type="password" autocomplete="current-password" placeholder="Пароль">
        <div class="form-error" id="authError"></div>
        <button class="apply-btn" id="authSubmit" type="submit">Войти</button>
      </form>
    </div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
const state = {
  view: 'home',
  provider: 'alloha',
  providers: [{ id: 'alloha', label: 'Alloha' }],
  collection: 'TOP_POPULAR_ALL',
  query: '',
  filters: { genre: '', type: '', order: 'RATING', yearFrom: '', yearTo: '' },
  page: 1,
  totalPages: 1,
  genres: [],
  items: [],
  selectedKpId: null,
  prevView: 'home',
  token: localStorage.getItem('cinema.jwt') || '',
  user: null,
  authMode: 'login',
  libraryType: 'favorites',
  adminTab: 'overview',
}

const COLLECTIONS = [
  { type: 'TOP_POPULAR_ALL',   label: 'Популярное' },
  { type: 'TOP_250_MOVIES',    label: 'Топ 250 фильмов' },
  { type: 'TOP_250_TV_SHOWS',  label: 'Топ 250 сериалов' },
  { type: 'POPULAR_SERIES',    label: 'Популярные сериалы' },
  { type: 'FAMILY',            label: 'Семейное' },
  { type: 'COMICS_THEME',      label: 'Комиксы' },
]

const TYPES = [
  { val: '',          label: 'Любой тип' },
  { val: 'FILM',      label: 'Фильм' },
  { val: 'TV_SERIES', label: 'Сериал' },
  { val: 'TV_SHOW',   label: 'ТВ-шоу' },
  { val: 'MINI_SERIES', label: 'Мини-сериал' },
]

const ORDERS = [
  { val: 'RATING',   label: 'По рейтингу' },
  { val: 'NUM_VOTE', label: 'По голосам' },
  { val: 'YEAR',     label: 'По году' },
]

// ── Utils ──────────────────────────────────────────────────────────────────
function esc(v) {
  return String(v ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}

async function api(url) {
  const headers = { Accept: 'application/json' }
  if (state.token) headers.Authorization = 'Bearer ' + state.token
  const r = await fetch(url, { headers })
  const text = await r.text()
  let data = {}
  try { data = JSON.parse(text) } catch (_) { throw new Error(text) }
  if (!r.ok) throw new Error(data.error || text || `HTTP ${r.status}`)
  return data
}

async function apiJSON(url, body, method = 'POST') {
  const headers = { Accept: 'application/json', 'Content-Type': 'application/json' }
  if (state.token) headers.Authorization = 'Bearer ' + state.token
  const r = await fetch(url, { method, headers, body: JSON.stringify(body || {}) })
  const text = await r.text()
  let data = {}
  try { data = JSON.parse(text) } catch (_) { throw new Error(text) }
  if (!r.ok) throw new Error(data.error || text || `HTTP ${r.status}`)
  return data
}

// ── Auth ────────────────────────────────────────────────────────────────────
function showAuthModal(mode = 'login') {
  state.authMode = mode
  document.getElementById('authModal').classList.add('active')
  document.getElementById('authTitle').textContent = mode === 'login' ? 'Вход' : 'Регистрация'
  document.getElementById('authSubmit').textContent = mode === 'login' ? 'Войти' : 'Создать аккаунт'
  document.getElementById('authLoginTab').classList.toggle('active', mode === 'login')
  document.getElementById('authRegisterTab').classList.toggle('active', mode === 'register')
  document.getElementById('authError').textContent = ''
}

function hideAuthModal() {
  document.getElementById('authModal').classList.remove('active')
}

async function submitAuth(e) {
  e.preventDefault()
  const login = document.getElementById('authLogin').value.trim()
  const password = document.getElementById('authPassword').value.trim()
  const error = document.getElementById('authError')
  error.textContent = ''
  try {
    const data = await apiJSON(`/api/auth/${state.authMode}`, { login, password })
    state.token = data.token || ''
    state.user = data.user || null
    if (state.token) localStorage.setItem('cinema.jwt', state.token)
    updateHeaderAuth()
    hideAuthModal()
    if (state.view === 'library') renderLibrary(state.libraryType)
  } catch (err) {
    error.textContent = err.message
  }
}

async function loadMe() {
  if (!state.token) { updateHeaderAuth(); return }
  try {
    const data = await api('/api/auth/me')
    state.user = data.user || null
  } catch (_) {
    state.token = ''
    state.user = null
    localStorage.removeItem('cinema.jwt')
  }
  updateHeaderAuth()
}

function logout() {
  state.token = ''
  state.user = null
  localStorage.removeItem('cinema.jwt')
  updateHeaderAuth()
  if (state.view === 'admin') goHome()
}

function updateHeaderAuth() {
  const loginBtn = document.getElementById('loginBtn')
  const adminBtn = document.getElementById('adminBtn')
  if (!loginBtn || !adminBtn) return
  adminBtn.style.display = state.user?.role === 'admin' ? '' : 'none'
  if (state.user) {
    loginBtn.textContent = state.user.login
    loginBtn.classList.add('user-chip')
    loginBtn.onclick = logout
    loginBtn.title = 'Выйти'
  } else {
    loginBtn.textContent = 'Войти'
    loginBtn.classList.remove('user-chip')
    loginBtn.onclick = () => showAuthModal('login')
    loginBtn.title = ''
  }
}

// ── Search ───────────────────────────────────────────────────────────────────
function renderSearch(restore = false) {
  const m = document.getElementById('main')
  const genreOpts = state.genres.map(g => `<option value="${esc(g.id)}" ${state.filters.genre == g.id ? 'selected' : ''}>${esc(g.genre)}</option>`).join('')
  const typeOpts = TYPES.map(t => `<option value="${esc(t.val)}" ${state.filters.type === t.val ? 'selected' : ''}>${esc(t.label)}</option>`).join('')
  const orderOpts = ORDERS.map(o => `<option value="${esc(o.val)}" ${state.filters.order === o.val ? 'selected' : ''}>${esc(o.label)}</option>`).join('')

  m.innerHTML = `
    <div class="page-title">
      Результаты поиска
      <small id="resultsCount"></small>
    </div>
    <div class="filter-bar">
      <select id="f-genre" onchange="onFilterChange()">
        <option value="">Жанр</option>
        ${genreOpts}
      </select>
      <select id="f-type" onchange="onFilterChange()">
        ${typeOpts}
      </select>
      <select id="f-order" onchange="onFilterChange()">
        ${orderOpts}
      </select>
      <label>Год от</label>
      <input type="number" id="f-yearFrom" placeholder="1990" min="1900" max="2030" value="${esc(state.filters.yearFrom)}" onchange="onFilterChange()">
      <label>до</label>
      <input type="number" id="f-yearTo" placeholder="2025" min="1900" max="2030" value="${esc(state.filters.yearTo)}" onchange="onFilterChange()">
      <button class="apply-btn" onclick="applySearch()">Применить</button>
    </div>
    <div id="gridWrap">${skeletonGrid(12)}</div>
    <div class="load-more-wrap" id="loadMoreWrap" style="display:none">
      <button class="load-more" id="loadMoreBtn" onclick="loadMoreSearch()">Загрузить ещё</button>
    </div>
  `
  if (!restore) applySearch()
  else renderGrid(state.items, 'gridWrap', state.items.length)
}

function onFilterChange() {
  state.filters.genre   = document.getElementById('f-genre')?.value || ''
  state.filters.type    = document.getElementById('f-type')?.value || ''
  state.filters.order   = document.getElementById('f-order')?.value || 'RATING'
  state.filters.yearFrom = document.getElementById('f-yearFrom')?.value || ''
  state.filters.yearTo  = document.getElementById('f-yearTo')?.value || ''
}

async function applySearch() {
  onFilterChange()
  state.page = 1
  state.items = []
  document.getElementById('gridWrap').innerHTML = skeletonGrid(12)

  const params = new URLSearchParams()
  if (state.query) {
    // keyword search — simpler endpoint
    params.set('keyword', state.query)
    if (state.filters.type) params.set('type', state.filters.type)
    if (state.filters.order) params.set('order', state.filters.order)
    if (state.filters.yearFrom) params.set('yearFrom', state.filters.yearFrom)
    if (state.filters.yearTo) params.set('yearTo', state.filters.yearTo)
    if (state.filters.genre) params.set('genres', state.filters.genre)
    params.set('page', state.page)
    await fetchFilmsFilter(params)
  } else {
    // filter browse without keyword
    if (state.filters.type) params.set('type', state.filters.type)
    if (state.filters.order) params.set('order', state.filters.order)
    if (state.filters.yearFrom) params.set('yearFrom', state.filters.yearFrom)
    if (state.filters.yearTo) params.set('yearTo', state.filters.yearTo)
    if (state.filters.genre) params.set('genres', state.filters.genre)
    params.set('page', state.page)
    await fetchFilmsFilter(params)
  }
}

async function fetchFilmsFilter(params, append = false) {
  try {
    const data = await api('/api/films?' + params.toString())
    const items = data.items || []
    if (append) {
      state.items = [...state.items, ...items]
    } else {
      state.items = items
      state.totalPages = data.totalPages || 1
    }
    const count = document.getElementById('resultsCount')
    if (count) count.textContent = data.total ? `${data.total} результатов` : `${state.items.length} результатов`
    renderGrid(state.items, 'gridWrap')
    const lmw = document.getElementById('loadMoreWrap')
    const lmb = document.getElementById('loadMoreBtn')
    if (lmw && lmb) {
      lmw.style.display = (state.page < state.totalPages && items.length > 0) ? '' : 'none'
      lmb.disabled = false
    }
  } catch (e) {
    // fallback: keyword-only via /api/search
    if (state.query) {
      try {
        const data = await api('/api/search?q=' + encodeURIComponent(state.query))
        state.items = data.items || []
        const count = document.getElementById('resultsCount')
        if (count) count.textContent = `${state.items.length} результатов`
        renderGrid(state.items, 'gridWrap')
        const lmw = document.getElementById('loadMoreWrap')
        if (lmw) lmw.style.display = 'none'
        return
      } catch (_) {}
    }
    document.getElementById('gridWrap').innerHTML = `<div class="state-box"><strong>Ошибка</strong>${esc(e.message)}</div>`
  }
}

function loadMoreSearch() {
  const btn = document.getElementById('loadMoreBtn')
  if (btn) btn.disabled = true
  state.page++
  onFilterChange()
  const params = new URLSearchParams()
  if (state.query) params.set('keyword', state.query)
  if (state.filters.type) params.set('type', state.filters.type)
  if (state.filters.order) params.set('order', state.filters.order)
  if (state.filters.yearFrom) params.set('yearFrom', state.filters.yearFrom)
  if (state.filters.yearTo) params.set('yearTo', state.filters.yearTo)
  if (state.filters.genre) params.set('genres', state.filters.genre)
  params.set('page', state.page)
  fetchFilmsFilter(params, true)
}

async function fetchDetail(kpId) {
  try {
    const d = await api('/api/film?kp=' + encodeURIComponent(kpId))
    const titleEl = document.getElementById('detailTitle')
    const origEl  = document.getElementById('detailOriginal')
    const badgeEl = document.getElementById('detailBadges')
    const descEl  = document.getElementById('detailDesc')
    const posterEl = document.getElementById('detailPoster')

    if (titleEl) titleEl.textContent = d.title || `KP ${kpId}`
    if (origEl)  origEl.textContent  = d.originalTitle || ''

    const badges = []
    if (d.year)       badges.push(`<span class="badge">${esc(d.year)}</span>`)
    if (d.ratingKp)   badges.push(`<span class="badge rating">★ ${esc(d.ratingKp)} KP</span>`)
    if (d.ratingImdb) badges.push(`<span class="badge rating">★ ${esc(d.ratingImdb)} IMDb</span>`)
    if (d.duration)   badges.push(`<span class="badge">${esc(d.duration)}</span>`);
    (d.countries || []).slice(0, 2).forEach(c => badges.push(`<span class="badge">${esc(c)}</span>`));
    (d.genres || []).slice(0, 4).forEach(g => badges.push(`<span class="badge genre">${esc(g)}</span>`))
    if (badgeEl) badgeEl.innerHTML = badges.join('')

    if (descEl) descEl.textContent = d.description || d.slogan || 'Описание недоступно'
    if (posterEl && d.poster) posterEl.innerHTML = `<img src="${esc(proxyImg(d.poster))}" alt="${esc(d.title)}">`
  } catch (_) {}
}

async function loadPlayer(kpId) {
  const status = document.getElementById('playerStatus')
  const loading = document.getElementById('playerLoading')
  const placeholder = document.getElementById('playerPlaceholder')
  const frame = document.getElementById('playerFrame')
  if (!frame) return

  if (status) { status.textContent = 'Загрузка...'; status.className = 'status-badge loading' }
  if (loading) loading.classList.add('active')
  if (placeholder) placeholder.style.display = 'none'
  frame.style.display = 'none'
  frame.src = ''

  try {
    const data = await api(`/api/player?provider=${encodeURIComponent(state.provider)}&kp=${encodeURIComponent(kpId)}`)
    if (!data.playerUrl) throw new Error('playerUrl отсутствует')

    frame.onload = () => {
      if (loading) loading.classList.remove('active')
      if (status) { status.textContent = 'Загружен'; status.className = 'status-badge' }
      frame.style.display = 'block'
    }
    frame.src = data.playerUrl
  } catch (e) {
    if (loading) loading.classList.remove('active')
    if (status) { status.textContent = 'Ошибка'; status.className = 'status-badge error' }
    if (placeholder) {
      placeholder.style.display = 'flex'
      const p = placeholder.querySelector('p')
      if (p) p.textContent = e.message
    }
  }
}

function reloadPlayer() {
  if (state.selectedKpId) loadPlayer(state.selectedKpId)
}

async function addFavorite(kpId) {
  try {
    await apiJSON('/api/library/favorites', { kpId, provider: state.provider })
    const status = document.getElementById('playerStatus')
    if (status) { status.textContent = 'В избранном'; status.className = 'status-badge' }
  } catch (e) {
    const status = document.getElementById('playerStatus')
    if (status) { status.textContent = 'Ошибка'; status.className = 'status-badge error' }
  }
}

function renderLibraryGrid(items, type) {
  const wrap = document.getElementById('libraryWrap')
  if (!wrap) return
  if (!items.length) {
    wrap.innerHTML = `<div class="state-box"><strong>${type === 'favorites' ? 'Избранное пусто' : 'История пуста'}</strong>Откройте фильм и загрузите плеер</div>`

  wrap.innerHTML = `<div class="grid">${items.map(item => renderLibraryCard(item, type)).join('')}</div>`

function renderLibraryCard(item, type) {
  const meta = [item.year, providerName(item.provider), item.timestamp ? new Date(item.timestamp).toLocaleDateString('ru-RU') : ''].filter(Boolean).join(' · ')
  const src = proxyImg(item.poster)
  return `
    <article class="card">
      <div class="card-poster" onclick="goDetail(${item.kpId})">
        ${src ? `<img src="${esc(src)}" alt="${esc(item.title)}" loading="lazy">` : ''}
        ${item.rating ? `<span class="card-rating">★ ${esc(item.rating)}</span>` : ''}
      </div>
      <div class="card-info">
        <div class="card-title" onclick="goDetail(${item.kpId})">${esc(item.title)}</div>
        <div class="card-meta">${esc(meta)}</div>
        <div class="card-actions">
          <button onclick="goDetail(${item.kpId})">Открыть</button>
          ${type === 'favorites' ? `<button onclick="removeFavorite(${item.kpId})">Убрать</button>` : ''}
        </div>
      </div>
    </article>
  `
}

function providerName(id) {
  return (state.providers.find(p => p.id === id) || {}).label || id || ''
}

}

async function changeUserRole(id, role) {
  try { await apiJSON(`/api/admin/users/${id}`, { role }, 'PATCH') }
  catch (e) { alert(e.message); renderAdminUsers() }
}

async function deleteUser(id) {
  try {
    await fetch(`/api/admin/users/${id}`, { method: 'DELETE', headers: { Authorization: 'Bearer ' + state.token } })
    renderAdminUsers()
  } catch (_) {}
}

async function renderAdminLibrary(type) {
  try {
    const data = await api(`/api/admin/library?type=${encodeURIComponent(type)}&limit=100`)
    const rows = (data.items || []).map(item => `
      <tr>
        <td>${esc(item.login)}</td>
        <td>${esc(item.kpId)}</td>
        <td>${esc(item.title)}</td>
        <td>${esc(providerName(item.provider))}</td>
        <td>${item.timestamp ? esc(new Date(item.timestamp).toLocaleString('ru-RU')) : ''}</td>
      </tr>
    `).join('')
    document.getElementById('adminWrap').innerHTML = `
      <div class="table-wrap"><table>
        <thead><tr><th>Логин</th><th>KP</th><th>Название</th><th>Плеер</th><th>Дата</th></tr></thead>
        <tbody>${rows || '<tr><td colspan="5">Нет данных</td></tr>'}</tbody>
      </table></div>
    `
  } catch (e) {
    document.getElementById('adminWrap').innerHTML = `<div class="state-box"><strong>Ошибка</strong>${esc(e.message)}</div>`
  }
}

function renderAdminPlayers() {
  const rows = state.providers.map(p => `
    <tr><td>${esc(p.id)}</td><td>${esc(p.label)}</td><td>${p.async ? 'API resolve' : 'iframe'}</td></tr>
  `).join('')
  document.getElementById('adminWrap').innerHTML = `
    <div class="table-wrap"><table>
      <thead><tr><th>ID</th><th>Название</th><th>Тип</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>
  `
}

// ── Grid rendering ──────────────────────────────────────────────────────────
function renderGrid(items, containerId) {
  const wrap = document.getElementById(containerId)
  if (!wrap) return
  if (!items.length) {
    wrap.innerHTML = '<div class="state-box"><strong>Ничего не найдено</strong>Попробуйте изменить запрос или фильтры</div>'
    return
  }
  wrap.innerHTML = `<div class="grid">${items.map(renderCard).join('')}</div>`
}

function proxyImg(url) {
  if (!url) return ''
  return '/proxy?url=' + encodeURIComponent(url)
}

function renderCard(item) {
  const meta = [item.year, (item.genres || []).slice(0, 2).join(', ')].filter(Boolean).join(' · ')
  const src = proxyImg(item.poster)
  return `
    <article class="card" onclick="goDetail(${item.kpId})">
      <div class="card-poster">
        ${src ? `<img src="${esc(src)}" alt="${esc(item.title)}" loading="lazy">` : ''}
        ${item.rating ? `<span class="card-rating">★ ${esc(item.rating)}</span>` : ''}
      </div>
      <div class="card-info">
        <div class="card-title">${esc(item.title)}</div>
        <div class="card-meta">${esc(meta)}</div>
      </div>
    </article>
  `
}

function skeletonGrid(n) {
  const cards = Array.from({ length: n }, () => `
    <div class="card">
      <div class="sk-poster skeleton"></div>
      <div class="sk-title skeleton"></div>
      <div class="sk-meta skeleton"></div>
    </div>
  `).join('')
  return `<div class="grid">${cards}</div>`
}

// ── Filters data ─────────────────────────────────────────────────────────────
async function loadFilters() {
  try {
    const data = await api('/api/filters')
    state.genres = (data.genres || []).filter(g => g.genre && g.id)
  } catch (_) {}
}

// ── Search input ──────────────────────────────────────────────────────────────
let searchTimer = null
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(searchTimer)
  const q = e.target.value.trim()
  if (!q) { if (state.view !== 'home') goHome(); return }
  searchTimer = setTimeout(() => goSearch(q), 400)
})
document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    clearTimeout(searchTimer)
    const q = e.target.value.trim()
    if (q) goSearch(q)
  }
  if (e.key === 'Escape') { e.target.value = ''; goHome() }
})

document.getElementById('brandBtn').addEventListener('click', goHome)

// ── Boot ──────────────────────────────────────────────────────────────────────
loadMe()
loadProviders()
loadFilters()
renderHome()
</script>
</body>
</html>
